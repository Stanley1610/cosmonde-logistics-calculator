<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kalkulačka přepravy | Cosmonde</title>
  <style>
    :root {
      --blue:#27a9e0;
      --teal:#48bfae;
      --deep:#0f4550;
      --bg:#f4fbfd;
      --text:#12313a;
      --muted:#64748b;
      --line:#d6e7eb;
      --soft:#e8f8f7;
      --white:#ffffff;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family: Arial, Helvetica, sans-serif; background:linear-gradient(180deg,#f4fbfd 0%, #eef7f9 100%); color:var(--text); }
    .wrap { max-width:1120px; margin:0 auto; padding:28px 18px; }
    .header { display:flex; justify-content:space-between; gap:18px; align-items:center; margin-bottom:18px; }
    .brand { display:flex; align-items:center; gap:18px; }
    .logo { width:235px; max-width:42vw; height:auto; display:block; }
    h1 { margin:0; font-size:30px; color:var(--deep); letter-spacing:-0.02em; }
    p { margin:6px 0 0; color:var(--muted); }
    .card { background:rgba(255,255,255,.96); border:1px solid var(--line); border-radius:20px; padding:18px; box-shadow:0 12px 32px rgba(15,69,80,.08); }
    .grid { display:grid; gap:14px; }
    .inputs { grid-template-columns: repeat(5, minmax(0,1fr)); }
    label { display:block; font-size:13px; font-weight:700; margin-bottom:6px; color:#234a54; }
    input, select { width:100%; border:1px solid #bddde3; border-radius:12px; padding:11px 12px; font-size:15px; background:#fff; color:var(--text); }
    input:focus, select:focus { outline:none; border-color:var(--teal); box-shadow:0 0 0 3px rgba(72,191,174,.18); }
    .tabs { display:flex; gap:8px; margin-bottom:14px; }
    .tab { border:1px solid var(--line); border-radius:999px; padding:10px 18px; cursor:pointer; background:#fff; font-weight:700; color:var(--deep); }
    .tab.active { background:linear-gradient(135deg,var(--blue),var(--teal)); color:white; border-color:transparent; box-shadow:0 8px 20px rgba(39,169,224,.22); }
    .kpi { background:var(--soft); border:1px solid #bfe7e4; border-radius:14px; padding:12px; }
    .kpi .val { font-size:22px; font-weight:800; color:var(--deep); }
    table { width:100%; border-collapse:separate; border-spacing:0; overflow:hidden; border-radius:14px; border:1px solid var(--line); }
    th { background:linear-gradient(135deg,var(--blue),var(--teal)); color:white; text-align:left; padding:12px; font-size:14px; }
    td { padding:12px; border-top:1px solid var(--line); background:white; }
    tr:nth-child(even) td { background:#f8fcfd; }
    .rank { font-weight:800; width:60px; text-align:center; color:var(--deep); }
    .price { text-align:right; font-variant-numeric:tabular-nums; }
    .winner td { background:#eafaf6 !important; }
    .warn { border:1px dashed #f59e0b; background:#fffbeb; color:#92400e; padding:14px; border-radius:14px; }
    .muted { color:var(--muted); font-size:13px; }
    .route-list { margin-top:14px; color:var(--muted); font-size:13px; }
    .source-pill { white-space:nowrap; background:#fff; border:1px solid var(--line); border-radius:999px; padding:8px 12px; }
    @media (max-width:900px) { .inputs { grid-template-columns:1fr 1fr; } .header { display:block; } .brand { align-items:flex-start; flex-direction:column; } .source-pill { display:inline-block; margin-top:10px; } }
  </style>
</head>
